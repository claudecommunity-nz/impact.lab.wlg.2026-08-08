# wcc-impact-platform — the Python helper library every module loader depends on.
# uv workspace member (see repo-root pyproject.toml). Import name: wcc_impact.

[project]
name = "wcc-impact-platform"
version = "0.1.0"
description = "Loader-side helpers for the WCC Emergency Hack: publish signals, register modules, Claude AI, uploads, geocoding, polling loops."
requires-python = ">=3.12"
dependencies = [
    "supabase>=2.5,<3",
    "anthropic>=0.40",
    "httpx>=0.27",
    "pydantic>=2.7",
    "python-dotenv>=1.0",
    # Windows has no system tz database — without this, ZoneInfo("Pacific/Auckland")
    # raises at import time on participant Windows laptops.
    "tzdata>=2024.1; sys_platform == 'win32'",
]

[dependency-groups]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/wcc_impact"]
